services:
  db:
    image: postgres:17
    container_name: moviebooking-db
    restart: always
    ports:
      - "5433:5432"
    env_file:
      - ./backend/.env
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      # Command to check if the PostgreSQL server is ready
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: moviebooking-redis
    restart: always
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      # Command to check if the Redis server is ready using redis-cli
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  moviebooking:
    # Use the image pulled from ACR (tag passed via environment variable)
    image: ${ACR_SERVER}/moviebooking-backend:${TAG:-latest}
    container_name: moviebooking-app
    env_file:
      - ./backend/.env
    # Use condition: service_healthy to wait for dependencies to be healthy
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || curl -fsS http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ============================================================================
  # NGINX Reverse Proxy - Public facing HTTPS endpoint
  # ============================================================================
  nginx:
    image: nginx:latest
    container_name: moviebooking-nginx
    restart: always
    ports:
      # Public entrypoints exposed on VM host.
      # NGINX then proxies into internal backend service moviebooking:8080.
      - "80:80"
      - "443:443"
      - "8888:8888"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      moviebooking:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - default
    environment:
      - TZ=Asia/Ho_Chi_Minh

volumes:
  db_data:
