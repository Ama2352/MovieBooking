name: CD - Application Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to build and deploy (e.g. v1.0.0, latest)"
        required: true
        default: "latest"
  workflow_run:
    workflows: ["CI - Quality Gates"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write # required to request OIDC tokens for Azure login
  contents: read # required to checkout the repository

env:
  IMAGE_NAME: moviebooking-backend
  TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event.inputs.version }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # =============================================================================
  # DEPLOY PHASE
  # =============================================================================
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Azure Login via OIDC
        uses: azure/login@v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate Deploy Script
        run: |
          cat << SCRIPT_ENV > deploy.sh
          #!/bin/bash
          set -euo pipefail

          echo "=========================================="
          echo "Starting MovieBooking Deployment via Azure Run Command..."
          echo "=========================================="

          echo "Login with managed identity..."
          # Self-healing: Ensure dependencies are installed if missing
          if ! command -v az &> /dev/null || ! command -v docker &> /dev/null; then
            echo "Installing missing dependencies (az/docker)..."
            # Cleanup broken repo files that might block apt updates
            sudo rm -f /etc/apt/sources.list.d/docker.list
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
            curl -fsSL https://get.docker.com | sudo sh
          fi

          az login --identity --client-id "${{ secrets.AZURE_VM_IDENTITY_CLIENT_ID }}" --allow-no-subscriptions

          sudo mkdir -p /opt/moviebooking/backend
          cd /opt/moviebooking

          KV_NAME="${{ secrets.AZURE_KEY_VAULT_NAME }}"
          echo "Fetching secrets from Key Vault (\$KV_NAME)..."
          get_secret() {
             az keyvault secret show --name "\$1" --vault-name "\$KV_NAME" --query "value" -o tsv 2>/dev/null || echo ""
          }

          echo "Creating secure environment file..."
          cat > backend/.env << ENV_EOF
          SPRING_PROFILES_ACTIVE=prod
          POSTGRES_DB=moviebooking
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=\$(get_secret "POSTGRES-PASSWORD")
          SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/moviebooking
          SPRING_JPA_HIBERNATE_DDL_AUTO=create
          JWT_SECRET=\$(get_secret "JWT-SECRET")
          GOOGLE_CLIENT_ID=\$(get_secret "GOOGLE-CLIENT-ID")
          GOOGLE_CLIENT_SECRET=\$(get_secret "GOOGLE-CLIENT-SECRET")
          SPRING_DATA_REDIS_HOST=redis
          SPRING_DATA_REDIS_PORT=6379
          SPRING_DATA_REDIS_TIMEOUT=60000
          SEAT_LOCK_DURATION_MINUTES=10
          SEAT_LOCK_MAX_SEATS_PER_BOOKING=10
          PAYPAL_CLIENT_ID=\$(get_secret "PAYPAL-CLIENT-ID")
          PAYPAL_CLIENT_SECRET=\$(get_secret "PAYPAL-CLIENT-SECRET")
          PAYPAL_MODE=sandbox
          MOMO_PARTNER_CODE=\$(get_secret "MOMO-PARTNER-CODE")
          MOMO_ACCESS_KEY=\$(get_secret "MOMO-ACCESS-KEY")
          MOMO_SECRET_KEY=\$(get_secret "MOMO-SECRET-KEY")
          K6_SEED_ENABLED=false
          DATA_SOURCE_NAME=postgresql://postgres:\$(get_secret "POSTGRES-PASSWORD")@db:5432/moviebooking?sslmode=disable
          FRONTEND_REDIRECT_URL=https://movie-booking-frontend-eta.vercel.app/oauth2/success
          FRONTEND_BASE_URL=https://movie-booking-frontend-eta.vercel.app
          ENV_EOF
          sed -i 's/^[[:space:]]*//' backend/.env

          # Ensure NGINX directories exist with proper permissions
          sudo mkdir -p ./nginx/conf.d
          sudo mkdir -p ./nginx/certs
          sudo mkdir -p ./logs/nginx

          API_DOMAIN=\$(get_secret "API-DOMAIN")
          CERTBOT_EMAIL=\$(get_secret "CERTBOT-EMAIL")

          if [ -z "\$API_DOMAIN" ] || [ -z "\$CERTBOT_EMAIL" ]; then
             echo "❌ API-DOMAIN or CERTBOT-EMAIL is not set in Key Vault."
             echo "Please configure 'API-DOMAIN' (e.g. movie-api.duckdns.org) and 'CERTBOT-EMAIL' in Key Vault."
             exit 1
          fi

          # Install Certbot if missing
          if ! command -v certbot &> /dev/null; then
            echo "Installing missing dependency: certbot..."
            sudo apt-get update
            sudo apt-get install -y certbot
          fi

          # Request Let's Encrypt Cert if not exists
          if [ ! -d "/etc/letsencrypt/live/\$API_DOMAIN" ]; then
            echo "Requesting Let's Encrypt cert for \$API_DOMAIN..."
            # Stop NGINX to free port 80 for verification
            if sudo docker ps -a | grep -q moviebooking-nginx; then
              sudo docker stop moviebooking-nginx || true
            fi
            
            # Using standalone with hooks so automated renewal handles NGINX stopping/starting
            sudo certbot certonly --standalone -d "\$API_DOMAIN" -m "\$CERTBOT_EMAIL" --agree-tos --no-eff-email -n \
              --pre-hook "docker stop moviebooking-nginx 2>/dev/null || true" \
              --post-hook "docker start moviebooking-nginx 2>/dev/null || true"
          fi
          
          SCRIPT_ENV

          # Reconstruct docker-compose.yml directly on the VM
          # Quote heredoc delimiter to avoid expanding ${...} placeholders from docker-compose at script generation time.
          echo "cat > docker-compose.yml << 'DOCKER_EOF'" >> deploy.sh
          cat docker-compose.yml >> deploy.sh
          echo "DOCKER_EOF" >> deploy.sh

          # Deploy NGINX configuration
          echo "cat > nginx/nginx.conf << 'NGINX_MAIN_EOF'" >> deploy.sh
          cat nginx/nginx.conf >> deploy.sh
          echo "NGINX_MAIN_EOF" >> deploy.sh

          echo "mkdir -p nginx/conf.d" >> deploy.sh
          echo "cat > nginx/conf.d/moviebooking.conf << 'NGINX_CONF_EOF'" >> deploy.sh
          cat nginx/conf.d/moviebooking.conf >> deploy.sh
          echo "NGINX_CONF_EOF" >> deploy.sh

          # Inject real domain into NGINX config
          echo "sed -i \"s/API_DOMAIN_PLACEHOLDER/\$API_DOMAIN/g\" nginx/conf.d/moviebooking.conf" >> deploy.sh

          cat << SCRIPT_EXEC >> deploy.sh
          export TAG="${TAG}"
          export DOCKERHUB_USERNAME="\$(get_secret "DOCKERHUB-USERNAME")"
          export DOCKERHUB_TOKEN="\$(get_secret "DOCKERHUB-TOKEN")"

          echo "Authenticating with DockerHub..."
          if [ -n "\$DOCKERHUB_USERNAME" ] && [ -n "\$DOCKERHUB_TOKEN" ]; then
            echo "\$DOCKERHUB_TOKEN" | sudo docker login -u "\$DOCKERHUB_USERNAME" --password-stdin
          else
            echo "Skipping DockerHub login (credentials not found in KeyVault)..."
          fi

          echo ""
          echo "=========================================="
          echo "Pulling latest images and restarting services..."
          echo "=========================================="
          sudo DOCKERHUB_USERNAME="\${DOCKERHUB_USERNAME}" TAG="${TAG}" docker compose pull

          # Fix permissions on config files
          sudo chmod 644 nginx/nginx.conf
          sudo chmod 644 nginx/conf.d/moviebooking.conf
          
          # Start all services
          sudo DOCKERHUB_USERNAME="\${DOCKERHUB_USERNAME}" TAG="${TAG}" docker compose up -d --remove-orphans

          # Wait for NGINX to be ready
          echo ""
          echo "Waiting for services to start..."
          sleep 5
          
          # Verify NGINX is running
          if sudo docker ps | grep -q moviebooking-nginx; then
            echo "✅ NGINX container started successfully"
          else
            echo "❌ NGINX container failed to start"
            sudo docker compose logs nginx
            exit 1
          fi

          # Verify NGINX is responding
          echo ""
          echo "Checking NGINX health..."
          if sudo docker compose exec -T nginx curl -f http://localhost:8888/health > /dev/null 2>&1; then
            echo "✅ NGINX is healthy"
          else
            echo "⚠️  NGINX health check failed (may be starting)"
          fi

          echo ""
          echo "=========================================="
          echo "✅ Deployment complete!"
          echo "=========================================="
          echo ""
          echo "📝 Next Steps:"
          echo "1. Verify HTTPS: curl -k https://<YOUR_PUBLIC_IP>"
          echo "2. Check NGINX status: docker exec moviebooking-nginx curl http://localhost:8888/health"
          echo "3. View NGINX logs: docker logs moviebooking-nginx"
          SCRIPT_EXEC

      - name: Execute Deploy Script on VM
        uses: azure/cli@v2.0.0
        with:
          azcliversion: latest
          inlineScript: |
            az vm run-command invoke \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_VM_NAME }}" \
              --command-id RunShellScript \
              --scripts @deploy.sh \
              --query 'value[0].message' \
              -o tsv
