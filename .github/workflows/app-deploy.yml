name: Application Deploy (Docker)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to build and deploy (e.g. v1.0.0, latest)"
        required: true
        default: "latest"

permissions:
  id-token: write # required to request OIDC tokens for Azure login
  contents: read # required to checkout the repository

env:
  ACR_SERVER: ${{ secrets.AZURE_ACR_SERVER }}
  IMAGE_NAME: moviebooking-backend
  TAG: ${{ github.event.inputs.version }}

jobs:
  # =============================================================================
  # BUILD & PUSH PHASE
  # =============================================================================
  build-and-push:
    name: Build and Push to ACR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Login to Azure via OIDC
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 2. Login to Azure Container Registry
      - name: ACR Login
        run: |
          # Use az cli to login to ACR without needing admin enabled (uses Entra ID token)
          az acr login -n ${{ env.ACR_SERVER }}

      # 3. Build the Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ env.ACR_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.TAG }} -f backend/Dockerfile backend

      # 4. Push to ACR
      - name: Push Docker Image
        run: |
          docker push ${{ env.ACR_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}

  # =============================================================================
  # DEPLOY PHASE
  # =============================================================================
  deploy:
    name: Deploy to VM
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate Deploy Script
        run: |
          cat << 'SCRIPT_ENV' > deploy.sh
          #!/bin/bash
          echo "=========================================="
          echo "Starting MovieBooking Deployment via Azure Run Command..."
          echo "=========================================="

          echo "Login with managed identity..."
          az login --identity --client-id "${{ secrets.AZURE_VM_IDENTITY_CLIENT_ID }}" --allow-no-subscriptions

          sudo mkdir -p /opt/moviebooking/backend
          cd /opt/moviebooking

          KV_NAME="${{ secrets.AZURE_KEY_VAULT_NAME }}"
          echo "Fetching secrets from Key Vault ($KV_NAME)..."
          get_secret() {
             az keyvault secret show --name "$1" --vault-name "$KV_NAME" --query "value" -o tsv 2>/dev/null || echo ""
          }

          echo "Creating secure environment file..."
          cat > backend/.env << ENV_EOF
          SPRING_PROFILES_ACTIVE=prod
          POSTGRES_DB=moviebooking
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=$(get_secret "POSTGRES-PASSWORD")
          SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/moviebooking
          SPRING_JPA_HIBERNATE_DDL_AUTO=create
          JWT_SECRET=$(get_secret "JWT-SECRET")
          GOOGLE_CLIENT_ID=$(get_secret "GOOGLE-CLIENT-ID")
          GOOGLE_CLIENT_SECRET=$(get_secret "GOOGLE-CLIENT-SECRET")
          SPRING_DATA_REDIS_HOST=redis
          SPRING_DATA_REDIS_PORT=6379
          SPRING_DATA_REDIS_TIMEOUT=60000
          SEAT_LOCK_DURATION_MINUTES=10
          SEAT_LOCK_MAX_SEATS_PER_BOOKING=10
          PAYPAL_CLIENT_ID=$(get_secret "PAYPAL-CLIENT-ID")
          PAYPAL_CLIENT_SECRET=$(get_secret "PAYPAL-CLIENT-SECRET")
          PAYPAL_MODE=sandbox
          MOMO_PARTNER_CODE=$(get_secret "MOMO-PARTNER-CODE")
          MOMO_ACCESS_KEY=$(get_secret "MOMO-ACCESS-KEY")
          MOMO_SECRET_KEY=$(get_secret "MOMO-SECRET-KEY")
          K6_SEED_ENABLED=true
          DATA_SOURCE_NAME=postgresql://postgres:$(get_secret "POSTGRES-PASSWORD")@db:5432/moviebooking?sslmode=disable
          ENV_EOF
          sed -i 's/^[[:space:]]*//' backend/.env
          SCRIPT_ENV

          # Reconstruct docker-compose.yml directly on the VM
          echo "cat > docker-compose.yml << 'DOCKER_EOF'" >> deploy.sh
          cat docker-compose.yml >> deploy.sh
          echo "DOCKER_EOF" >> deploy.sh

          cat << 'SCRIPT_EXEC' >> deploy.sh
          export ACR_SERVER="${{ env.ACR_SERVER }}"
          export TAG="${{ env.TAG }}"

          echo "Pulling latest image and restarting services..."
          sudo -E docker compose pull moviebooking
          sudo -E docker compose up -d

          echo "✅ Deployment complete!"
          SCRIPT_EXEC

      - name: Execute Deploy Script on VM
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az vm run-command invoke \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_VM_NAME }}" \
              --command-id RunShellScript \
              --scripts @deploy.sh
