name: Application Deploy (Docker)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to build and deploy (e.g. v1.0.0, latest)"
        required: true
        default: "latest"

permissions:
  id-token: write # required to request OIDC tokens for Azure login
  contents: read # required to checkout the repository

env:
  ACR_SERVER: ${{ secrets.AZURE_ACR_SERVER }}
  IMAGE_NAME: moviebooking-backend
  TAG: ${{ github.event.inputs.version }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # =============================================================================
  # BUILD & PUSH PHASE
  # =============================================================================
  build-and-push:
    name: Build and Push to ACR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Login to Azure via OIDC
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 2. Login to Azure Container Registry
      - name: ACR Login
        run: |
          # Use az cli to login to ACR without needing admin enabled (uses Entra ID token)
          az acr login -n ${{ env.ACR_SERVER }}

      # 3. Build the Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ env.ACR_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.TAG }} -f backend/Dockerfile backend

      # 4. Push to ACR
      - name: Push Docker Image
        run: |
          docker push ${{ env.ACR_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}

  # =============================================================================
  # DEPLOY PHASE
  # =============================================================================
  deploy:
    name: Deploy to VM
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate Deploy Script
        run: |
          cat << 'SCRIPT_ENV' > deploy.sh
          #!/bin/bash
          echo "=========================================="
          echo "Starting MovieBooking Deployment via Azure Run Command..."
          echo "=========================================="

          echo "Login with managed identity..."
          # Self-healing: Ensure dependencies are installed if missing
          if ! command -v az &> /dev/null || ! command -v docker &> /dev/null; then
            echo "Installing missing dependencies (az/docker)..."
            # Cleanup broken repo files that might block apt updates
            sudo rm -f /etc/apt/sources.list.d/docker.list
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
            curl -fsSL https://get.docker.com | sudo sh
          fi

          az login --identity --client-id "${{ secrets.AZURE_VM_IDENTITY_CLIENT_ID }}" --allow-no-subscriptions

          sudo mkdir -p /opt/moviebooking/backend
          cd /opt/moviebooking

          KV_NAME="${{ secrets.AZURE_KEY_VAULT_NAME }}"
          echo "Fetching secrets from Key Vault ($KV_NAME)..."
          get_secret() {
             az keyvault secret show --name "$1" --vault-name "$KV_NAME" --query "value" -o tsv 2>/dev/null || echo ""
          }

          echo "Creating secure environment file..."
          cat > backend/.env << ENV_EOF
          SPRING_PROFILES_ACTIVE=prod
          POSTGRES_DB=moviebooking
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=$(get_secret "POSTGRES-PASSWORD")
          SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/moviebooking
          SPRING_JPA_HIBERNATE_DDL_AUTO=create
          JWT_SECRET=$(get_secret "JWT-SECRET")
          GOOGLE_CLIENT_ID=$(get_secret "GOOGLE-CLIENT-ID")
          GOOGLE_CLIENT_SECRET=$(get_secret "GOOGLE-CLIENT-SECRET")
          SPRING_DATA_REDIS_HOST=redis
          SPRING_DATA_REDIS_PORT=6379
          SPRING_DATA_REDIS_TIMEOUT=60000
          SEAT_LOCK_DURATION_MINUTES=10
          SEAT_LOCK_MAX_SEATS_PER_BOOKING=10
          PAYPAL_CLIENT_ID=$(get_secret "PAYPAL-CLIENT-ID")
          PAYPAL_CLIENT_SECRET=$(get_secret "PAYPAL-CLIENT-SECRET")
          PAYPAL_MODE=sandbox
          MOMO_PARTNER_CODE=$(get_secret "MOMO-PARTNER-CODE")
          MOMO_ACCESS_KEY=$(get_secret "MOMO-ACCESS-KEY")
          MOMO_SECRET_KEY=$(get_secret "MOMO-SECRET-KEY")
          K6_SEED_ENABLED=false
          DATA_SOURCE_NAME=postgresql://postgres:$(get_secret "POSTGRES-PASSWORD")@db:5432/moviebooking?sslmode=disable
          ENV_EOF
          sed -i 's/^[[:space:]]*//' backend/.env

          # Ensure NGINX directories exist with proper permissions
          sudo mkdir -p ./nginx/conf.d
          sudo mkdir -p ./nginx/certs
          sudo mkdir -p ./logs/nginx

          # Ensure OpenSSL exists for certificate generation
          if ! command -v openssl &> /dev/null; then
            echo "Installing missing dependency: openssl"
            sudo apt-get update
            sudo apt-get install -y openssl
          fi

          # Generate self-signed certificate if not present
          if [ ! -f ./nginx/certs/moviebooking.crt ] || [ ! -f ./nginx/certs/moviebooking.key ]; then
            echo "Generating self-signed certificate for NGINX..."
            sudo openssl req -x509 -newkey rsa:4096 \
              -keyout ./nginx/certs/moviebooking.key \
              -out ./nginx/certs/moviebooking.crt \
              -days 365 -nodes \
              -subj "/C=VN/ST=Ho Chi Minh/L=Ho Chi Minh/O=MovieBooking/CN=moviebooking.local"
            sudo chmod 644 ./nginx/certs/moviebooking.crt
            sudo chmod 600 ./nginx/certs/moviebooking.key
          fi
          
          SCRIPT_ENV

          # Reconstruct docker-compose.yml directly on the VM
          echo "cat > docker-compose.yml << 'DOCKER_EOF'" >> deploy.sh
          cat docker-compose.yml >> deploy.sh
          echo "DOCKER_EOF" >> deploy.sh

          # Deploy NGINX configuration
          echo "cat > nginx/nginx.conf << 'NGINX_MAIN_EOF'" >> deploy.sh
          cat nginx/nginx.conf >> deploy.sh
          echo "NGINX_MAIN_EOF" >> deploy.sh

          echo "mkdir -p nginx/conf.d" >> deploy.sh
          echo "cat > nginx/conf.d/moviebooking.conf << 'NGINX_CONF_EOF'" >> deploy.sh
          cat nginx/conf.d/moviebooking.conf >> deploy.sh
          echo "NGINX_CONF_EOF" >> deploy.sh

          cat << 'SCRIPT_EXEC' >> deploy.sh
          export ACR_SERVER="${{ env.ACR_SERVER }}"
          export TAG="${{ env.TAG }}"

          echo "Authenticating with ACR..."
          az acr login -n "${ACR_SERVER}"

          echo ""
          echo "=========================================="
          echo "Pulling latest images and restarting services..."
          echo "=========================================="
          sudo -E docker compose pull

          # Fix permissions on config files
          sudo chmod 644 nginx/nginx.conf
          sudo chmod 644 nginx/conf.d/moviebooking.conf
          
          # Start all services
          sudo -E docker compose up -d --remove-orphans

          # Wait for NGINX to be ready
          echo ""
          echo "Waiting for services to start..."
          sleep 5
          
          # Verify NGINX is running
          if sudo docker ps | grep -q moviebooking-nginx; then
            echo "✅ NGINX container started successfully"
          else
            echo "❌ NGINX container failed to start"
            sudo docker compose logs nginx
            exit 1
          fi

          # Verify NGINX is responding
          echo ""
          echo "Checking NGINX health..."
          if sudo docker compose exec -T nginx curl -f http://localhost:8888/health > /dev/null 2>&1; then
            echo "✅ NGINX is healthy"
          else
            echo "⚠️  NGINX health check failed (may be starting)"
          fi

          echo ""
          echo "=========================================="
          echo "✅ Deployment complete!"
          echo "=========================================="
          echo ""
          echo "📝 Next Steps:"
          echo "1. Verify HTTPS: curl -k https://<YOUR_PUBLIC_IP>"
          echo "2. Check NGINX status: docker exec moviebooking-nginx curl http://localhost:8888/health"
          echo "3. View NGINX logs: docker logs moviebooking-nginx"
          SCRIPT_EXEC

      - name: Execute Deploy Script on VM
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az vm run-command invoke \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_VM_NAME }}" \
              --command-id RunShellScript \
              --scripts @deploy.sh \
              --query 'value[0].message' \
              -o tsv
