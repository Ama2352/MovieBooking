name: Infrastructure Deploy (Terraform)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        type: choice
        default: apply
        options: [apply, destroy]

permissions:
  id-token: write # required to request OIDC tokens for Azure login
  contents: read  # required to checkout the repository

env:
  TF_WORKING_DIR: infrastructure/terraform/environments/dev
  TF_STATE_RG: moviebooking-tfstate-rg
  TF_STATE_STORAGE: moviebookingtfstate
  TF_STATE_CONTAINER: tfstate
  
  # Azure creds from GitHub Secrets
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: "true"

jobs:
  # =============================================================================
  # PLAN PHASE
  # =============================================================================
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'apply' }}

    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Generate One-Time SSH Key
        run: |
          mkdir -p ssh-artifacts
          ssh-keygen -t rsa -b 4096 -f ssh-artifacts/id_rsa -N ""

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ env.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ env.TF_STATE_STORAGE }}" \
            -backend-config="container_name=${{ env.TF_STATE_CONTAINER }}" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform Plan
        id: check
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_additional_ssh_keys: |
            ["${{ secrets.LOCAL_SSH_PUBLIC_KEY }}"]
        run: |
          terraform plan \
            -var="ssh_public_key=$(cat $GITHUB_WORKSPACE/ssh-artifacts/id_rsa.pub)" \
            -out=tfplan \
            -detailed-exitcode || EXIT=$?

          if [ "$EXIT" = "2" ]; then echo "has_changes=true" >> $GITHUB_OUTPUT;
          else echo "has_changes=false" >> $GITHUB_OUTPUT; fi

      - name: Upload Plan Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-bundle
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ssh-artifacts/id_rsa
            ssh-artifacts/id_rsa.pub

  # =============================================================================
  # APPLY PHASE & SECRET EXTRACTION
  # =============================================================================
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: ${{ github.event.inputs.action == 'apply' }}

    steps:
      - uses: actions/checkout@v4

      - name: Download Plan Bundle
        uses: actions/download-artifact@v4
        with:
          name: tfplan-bundle

      - name: Verify Plan Exists
        run: |
          if [ ! -f ${{ env.TF_WORKING_DIR }}/tfplan ]; then
            echo "❌ ERROR: No tfplan file found."
            exit 1
          fi
          echo "✅ tfplan found"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ env.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ env.TF_STATE_STORAGE }}" \
            -backend-config="container_name=${{ env.TF_STATE_CONTAINER }}" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Extract Outputs & Update GitHub Secrets
        id: out
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          # Retrieve outputs from Terraform state
          IP=$(terraform output -raw vm_public_ip)
          USER=$(terraform output -raw admin_username)
          ACR=$(terraform output -raw acr_login_server)
          
          # Push core infrastructure coordinates back to GitHub Secrets for CD pipeline
          gh secret set AZURE_VM_HOST -b"$IP"
          gh secret set AZURE_VM_USERNAME -b"$USER"
          gh secret set AZURE_ACR_SERVER -b"$ACR"
          
          # Store the SSH key to authorize app deployments
          gh secret set AZURE_VM_SSH_KEY -b"$(cat $GITHUB_WORKSPACE/ssh-artifacts/id_rsa)"
          
          echo "✅ Successfully synced Infra Outputs to GitHub Actions Secrets!"
          echo "ACR Server: $ACR"
          echo "VM IP: $IP"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_MOVIEBOOKING }}

  # =============================================================================
  # DESTROY PHASE
  # =============================================================================
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'destroy' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ env.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ env.TF_STATE_STORAGE }}" \
            -backend-config="container_name=${{ env.TF_STATE_CONTAINER }}" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform destroy -auto-approve \
            -var="ssh_public_key=dummy-key-not-used-for-destroy" \
            || true

      - name: Cleanup Secrets
        run: |
          gh secret delete AZURE_VM_HOST || true
          gh secret delete AZURE_VM_USERNAME || true
          gh secret delete AZURE_VM_SSH_KEY || true
          gh secret delete AZURE_ACR_SERVER || true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_MOVIEBOOKING }}
