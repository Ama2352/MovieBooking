name: CI - Quality Gates

on:
  push:
    branches: [ "**" ] # all branches
  pull_request:
    branches: [ main ]  # run CI when merging into main
  workflow_dispatch:
    inputs:
      run_full_regression:
        description: "Run full regression suite"
        required: false
        default: "false"

# Permissions required for test-reporter to create check runs
permissions:
  id-token: write
  contents: read
  checks: write
  pull-requests: write

env:
  ACR_SERVER: ${{ secrets.AZURE_ACR_SERVER }}
  IMAGE_NAME: moviebooking-backend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ----------------------------------------------------------------------
  # 1. DETECT CHANGES (Tìm kiếm các file bị ảnh hưởng)
  # ----------------------------------------------------------------------
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      test-classes: ${{ steps.detect.outputs.test_classes }}
      test-tags: ${{ steps.detect.outputs.test_tags }}
      has-changes: ${{ steps.detect.outputs.has_changes }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Lấy độ sâu đủ để so sánh giữa nhánh hiện tại và nhánh gốc
          fetch-depth: 2
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      # Cần compile để chạy DynamicSanityTestSelector
      - name: Compile test utilities
        working-directory: ./backend
        run: mvn test-compile -q
      
      - name: Detect changed modules and dependencies
        id: detect
        working-directory: ./backend
        run: |
          echo "🔍 Running Dynamic Sanity Test Selector..."
          # Chạy công cụ Java để xác định test classes và tags
          OUTPUT=$(mvn exec:java \
            -Dexec.mainClass="com.api.moviebooking.utils.DynamicSanityTestSelector" \
            -Dexec.classpathScope=test \
            -q 2>&1)
          
          # Trích xuất kết quả từ output
          TEST_CLASSES=$(echo "$OUTPUT" | awk -F'=' '/^TEST_CLASSES=/ {print $2}')
          TEST_TAGS=$(echo "$OUTPUT" | awk -F'=' '/^TEST_TAGS=/ {print $2}')
          
          if [ -z "$TEST_CLASSES" ] && [ -z "$TEST_TAGS" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "test_classes=$TEST_CLASSES" >> $GITHUB_OUTPUT
            echo "test_tags=$TEST_TAGS" >> $GITHUB_OUTPUT
          fi

  # ----------------------------------------------------------------------
  # 2. SMOKE TESTS (Cổng gác môi trường - Phải chạy đầu tiên)
  # ----------------------------------------------------------------------
  smoke-tests:
    name: Run Smoke Tests (Gate)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    
    # Cấu hình Services cho Integration Test
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: moviebooking_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: [ 5432:5432 ]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [ 6379:6379 ]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin', cache: maven }
      
      - name: Run smoke tests
        working-directory: ./backend
        run: mvn test -Psmoke -DfailIfNoTests=false
        env:
          SPRING_PROFILES_ACTIVE: test
      
      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: backend/target/surefire-reports/

  # ----------------------------------------------------------------------
  # 3. RUN DYNAMIC SANITY TESTS (Kiểm tra Logic bị thay đổi)
  # ----------------------------------------------------------------------
  sanity-tests:
    name: Run Dynamic Sanity Tests
    runs-on: ubuntu-latest
    needs: [detect-changes, smoke-tests] # Chạy sau khi Smoke pass
    # CHỈ chạy nếu có file code thay đổi VÀ Smoke Test pass
    if: needs.detect-changes.outputs.has-changes == 'true' && needs.smoke-tests.result == 'success'
    
    # ... (Giữ nguyên cấu hình Services như Smoke Tests)
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: moviebooking_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: [ 5432:5432 ]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [ 6379:6379 ]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin', cache: maven }
      
      - name: Run sanity tests by test classes
        if: needs.detect-changes.outputs.test-classes != ''
        working-directory: ./backend
        run: |
          TEST_CLASSES="${{ needs.detect-changes.outputs.test-classes }}"
          echo "🧪 Running tests for classes: $TEST_CLASSES"
          mvn test -Dtest="$TEST_CLASSES" -DfailIfNoTests=false
        env:
          SPRING_PROFILES_ACTIVE: test
      
      - name: Run sanity tests by tags
        if: needs.detect-changes.outputs.test-tags != ''
        working-directory: ./backend
        run: |
          TEST_TAGS="${{ needs.detect-changes.outputs.test-tags }}"
          echo "🏷️ Running tests with tags: $TEST_TAGS"
          mvn test -Dgroups="$TEST_TAGS" -DfailIfNoTests=false
        env:
          SPRING_PROFILES_ACTIVE: test
      
      - name: Upload sanity test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanity-test-results
          path: backend/target/surefire-reports/

  # ----------------------------------------------------------------------
  # 4. RUN FULL REGRESSION TESTS (Kiểm tra Toàn diện)
  # ----------------------------------------------------------------------
  regression-tests:
    name: Run Full Regression Tests
    runs-on: ubuntu-latest
    needs: [smoke-tests, sanity-tests] # Phải chạy sau Sanity và Smoke
    if: |
      ((github.event_name == 'workflow_dispatch' && github.event.inputs.run_full_regression == 'true') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-full-tests'))) &&
      needs.smoke-tests.result == 'success' &&
      (needs.sanity-tests.result == 'success' || needs.sanity-tests.result == 'skipped')
    
    # ... (Giữ nguyên cấu hình Services như Smoke Tests)
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: moviebooking_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: [ 5432:5432 ]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [ 6379:6379 ]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin', cache: maven }

      - name: Run all regression tests
        working-directory: ./backend
        run: mvn test -Pregression -DfailIfNoTests=false
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload regression test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-results
          path: backend/target/surefire-reports/

      - name: Generate test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Regression Test Results
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      # ----------------------------------------------------------------------
  # 5. BUILD & PUSH IMAGE TO ACR (Release Artifact)
  # ----------------------------------------------------------------------
  build-and-push-acr:
    name: Build and Push to ACR
    runs-on: ubuntu-latest
    needs: [detect-changes, smoke-tests, sanity-tests]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.smoke-tests.result == 'success' || needs.smoke-tests.result == 'skipped') &&
      (needs.sanity-tests.result == 'success' || needs.sanity-tests.result == 'skipped')
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: |
          ACR_NAME="${{ env.ACR_SERVER }}"
          ACR_NAME="${ACR_NAME%%.azurecr.io}"
          az acr login -n "$ACR_NAME"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.ACR_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.ACR_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            -f backend/Dockerfile backend

      - name: Push Docker image tags
        run: |
          docker push ${{ env.ACR_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_SERVER }}/${{ env.IMAGE_NAME }}:latest

