upstream backend {
    # Internal upstream target inside Docker network.
    # NGINX forwards requests to moviebooking container on port 8080.
    server moviebooking:8080;
    keepalive 32;
}

# CORS configuration
map $http_origin $cors_origin {
    ~^https://movie-booking-frontend(-[a-z0-9]+)?\.vercel\.app$ $http_origin;
    "http://localhost:5173" $http_origin;
    default "";
}

server {
    # Public HTTP entrypoint.
    # Traffic at :80 is redirected to HTTPS (:443).
    listen 80;
    listen [::]:80;
    server_name _;

    location / {
        return 301 https://$host$request_uri;
    }

    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

server {
    # Public HTTPS entrypoint.
    # Requests received at :443 are proxied to upstream "backend" (moviebooking:8080).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/certs/moviebooking.crt;
    ssl_certificate_key /etc/nginx/certs/moviebooking.key;

    # TLS Versions and Ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # SSL Session Cache
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Default CORS headers for all responses from this server block.
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, DNT, User-Agent, If-Modified-Since, Cache-Control, Range" always;
    add_header Vary "Origin, Access-Control-Request-Method, Access-Control-Request-Headers" always;

    access_log /var/log/nginx/moviebooking_access.log main;
    error_log /var/log/nginx/moviebooking_error.log warn;

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        # Handle CORS preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers $http_access_control_request_headers always;
            add_header Access-Control-Max-Age "86400" always;
            add_header Content-Type "text/plain; charset=utf-8" always;
            add_header Content-Length "0" always;
            return 204;
        }

        # Main forwarding rule: 443 -> backend -> moviebooking:8080
        proxy_pass http://backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    location /api/ {
        # Handle CORS preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers $http_access_control_request_headers always;
            add_header Access-Control-Max-Age "86400" always;
            add_header Content-Type "text/plain; charset=utf-8" always;
            add_header Content-Length "0" always;
            return 204;
        }

        # API forwarding rule: 443/api/* -> backend -> moviebooking:8080
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_no_cache 1;
        proxy_cache_bypass 1;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # Static assets are also proxied to backend app.
        proxy_pass http://backend;
        proxy_cache_valid 30d;
        add_header Cache-Control "public, immutable";
        expires 30d;
    }
}

server {
    listen 8888 default_server;
    listen [::]:8888 default_server;
    server_name _;

    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 404;
    }
}
